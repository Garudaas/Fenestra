services:
  # Backend: Push Notification Server
  - type: web
    name: fenestrians-server
    runtime: node
    rootDir: ./server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production

  # Frontend: Static Site
  - type: static
    name: Fenestrians-App
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://dojlbfnfhkfltlxggxiy.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvamxiZm5maGtmbHRseGdneGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTQ3MzgsImV4cCI6MjA5NzI3MDczOH0.EFjPpLqZDGb7rciXIgQgUyA6IXGTfjYcOF25BR3_QMo
      - key: VITE_API_URL
